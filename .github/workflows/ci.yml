name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alphadb
          POSTGRES_PASSWORD: alphadb
          POSTGRES_DB: alphadb
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U alphadb -d alphadb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://alphadb:alphadb@localhost:55433/alphadb
      ALPHADB_ENV: ci
      ALPHADB_RUNTIME_MODE: fixture
      ALPHADB_ENABLE_LIVE_ORDERS: "0"
      ALPHADB_HUMAN_CUTOVER_APPROVED: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev,dashboard]"

      - name: Repository hygiene gate
        run: alphadb-repo-hygiene check

      - name: Test
        run: pytest -q
