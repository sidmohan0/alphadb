name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alphadb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d alphadb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run discovery schema migration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alphadb
          REDIS_URL: redis://localhost:6379
        run: npm run polymarket:discovery-migrate

      - name: Build server artifacts
        run: npm run build --workspace server

      - name: Startup resilience and restart smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alphadb
          REDIS_URL: redis://localhost:6379
        run: |
          set -euo pipefail

          start_server() {
            local label=$1
            local log_file="/tmp/discovery-${label}.log"
            local pid_file="/tmp/discovery-${label}.pid"

            DISCOVERY_REQUIRE_SCHEMA=1 npm run start --workspace server > "$log_file" 2>&1 &
            local pid=$!
            echo "$pid" > "$pid_file"

            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:4000/api/health >/dev/null; then
                return 0
              fi

              if ! kill -0 "$pid" >/dev/null 2>&1; then
                echo "Server exited before becoming healthy ($label)"
                cat "$log_file"
                return 1
              fi

              sleep 1
            done

            echo "Server did not become healthy within timeout ($label)"
            cat "$log_file"
            return 1
          }

          stop_server() {
            local pid_file=$1
            local pid="$(cat "$pid_file")"
            kill "$pid" || true
            wait "$pid" || true
          }

          start_server cold
          curl -sS http://127.0.0.1:4000/api/polymarket/market-channels/runs/latest > /tmp/cold-latest.json || true
          stop_server /tmp/discovery-cold.pid

          start_server restart
          curl -sS http://127.0.0.1:4000/api/polymarket/market-channels/runs/latest > /tmp/restart-latest.json || true
          stop_server /tmp/discovery-restart.pid

      - name: Run unit/integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alphadb
          REDIS_URL: redis://localhost:6379
          DISCOVERY_INTEGRATION_TESTS: 1
          CLOB_API_URL: https://clob.polymarket.com
          CHAIN_ID: 137
        run: npm run test
