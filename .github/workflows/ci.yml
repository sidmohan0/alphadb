name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alphadb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d alphadb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run discovery schema migration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alphadb
          REDIS_URL: redis://localhost:6379
        run: npm run polymarket:discovery-migrate

      - name: Run unit/integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alphadb
          REDIS_URL: redis://localhost:6379
          DISCOVERY_INTEGRATION_TESTS: 1
          CLOB_API_URL: https://clob.polymarket.com
          CHAIN_ID: 137
        run: npm run test
