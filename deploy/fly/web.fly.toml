app = "alphadb-web"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "../../apps/web/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ALPHADB_WEB_API_BASE_URL = "https://alphadb-api.fly.dev/api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
