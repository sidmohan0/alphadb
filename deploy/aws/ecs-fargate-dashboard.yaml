AWSTemplateFormatVersion: "2010-09-09"
Description: AlphaDB AWS Cockpit on ECS Fargate with private AlphaDB API and managed Postgres dependency.

Parameters:
  ServiceName:
    Type: String
    Default: alphadb-cockpit
  CockpitContainerImage:
    Type: String
    Description: ECR image URI for the production-built Next.js Cockpit container.
  AlphaDbApiContainerImage:
    Type: String
    Description: ECR image URI for the Python AlphaDB API container.
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the Cockpit load balancer.
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for Cockpit and AlphaDB API Fargate tasks.
  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Set ENABLED only for smoke deployments in public subnets without NAT.
  DatabaseUrlSecretArn:
    Type: String
    Description: Secrets Manager ARN whose value is DATABASE_URL for the managed Postgres instance.
  CockpitPinSecretArn:
    Type: String
    Description: Secrets Manager ARN whose value is the four-digit Cockpit PIN.
  CockpitCookieSecretArn:
    Type: String
    Description: Secrets Manager ARN whose value signs Cockpit remember-cookies.
  KalshiApiKeyIdSecretArn:
    Type: String
    Description: Secrets Manager ARN whose value is KALSHI_API_KEY_ID.
  KalshiPrivateKeyPemSecretArn:
    Type: String
    Description: Secrets Manager ARN whose value is the Kalshi private key PEM.
  PrivateNamespaceName:
    Type: String
    Default: alphadb.local
    Description: Private Cloud Map namespace used only inside the VPC.
  CockpitPort:
    Type: Number
    Default: 3000
  AlphaDbApiPort:
    Type: Number
    Default: 8501
  DesiredCount:
    Type: Number
    Default: 1
  CockpitTaskCpu:
    Type: String
    Default: "512"
  CockpitTaskMemory:
    Type: String
    Default: "1024"
  AlphaDbApiTaskCpu:
    Type: String
    Default: "512"
  AlphaDbApiTaskMemory:
    Type: String
    Default: "1024"
  RuntimeMode:
    Type: String
    Default: gated-live
    AllowedValues:
      - fixture
      - shadow
      - paper
      - gated-live
  AwsRegionValue:
    Type: String
    Default: us-east-2

Resources:
  CockpitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ServiceName}/cockpit
      RetentionInDays: 14

  AlphaDbApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ServiceName}/alphadb-api
      RetentionInDays: 14

  DashboardCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ServiceName

  DashboardExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadCockpitAndAlphaDbApiSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseUrlSecretArn
                  - !Ref CockpitPinSecretArn
                  - !Ref CockpitCookieSecretArn
                  - !Ref KalshiApiKeyIdSecretArn
                  - !Sub "${KalshiApiKeyIdSecretArn}-*"
                  - !Ref KalshiPrivateKeyPemSecretArn
                  - !Sub "${KalshiPrivateKeyPemSecretArn}-*"

  CockpitTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  AlphaDbApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to the AlphaDB Cockpit load balancer.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  CockpitServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cockpit tasks accept traffic only from the load balancer.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref CockpitPort
          ToPort: !Ref CockpitPort
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AlphaDbApiServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AlphaDB API tasks accept traffic only from Cockpit tasks.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AlphaDbApiPort
          ToPort: !Ref AlphaDbApiPort
          SourceSecurityGroupId: !Ref CockpitServiceSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DashboardLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Ref ServiceName
      Scheme: internet-facing
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref PublicSubnetIds
      Type: application

  CockpitTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /healthz
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: "200"
      Port: !Ref CockpitPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId

  DashboardListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref CockpitTargetGroup
      LoadBalancerArn: !Ref DashboardLoadBalancer
      Port: 80
      Protocol: HTTP

  PrivateDnsNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Ref PrivateNamespaceName
      Vpc: !Ref VpcId

  AlphaDbApiDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Description: Private AlphaDB API service discovery entry.
      DnsConfig:
        DnsRecords:
          - TTL: 10
            Type: A
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Name: alphadb-api
      NamespaceId: !Ref PrivateDnsNamespace

  CockpitTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ServiceName}-cockpit
      Cpu: !Ref CockpitTaskCpu
      Memory: !Ref CockpitTaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt DashboardExecutionRole.Arn
      TaskRoleArn: !GetAtt CockpitTaskRole.Arn
      ContainerDefinitions:
        - Name: cockpit
          Image: !Ref CockpitContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref CockpitPort
              Protocol: tcp
          Environment:
            - Name: ALPHADB_ENV
              Value: aws
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Sub "${CockpitPort}"
            - Name: ALPHADB_API_BASE_URL
              Value: !Sub http://alphadb-api.${PrivateNamespaceName}:${AlphaDbApiPort}
            - Name: ALPHADB_COCKPIT_AUTH_REQUIRED
              Value: "1"
            - Name: ALPHADB_COCKPIT_COOKIE_TTL_SECONDS
              Value: "604800"
          Secrets:
            - Name: ALPHADB_COCKPIT_PIN
              ValueFrom: !Ref CockpitPinSecretArn
            - Name: ALPHADB_COCKPIT_COOKIE_SECRET
              ValueFrom: !Ref CockpitCookieSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CockpitLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: cockpit

  AlphaDbApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ServiceName}-alphadb-api
      Cpu: !Ref AlphaDbApiTaskCpu
      Memory: !Ref AlphaDbApiTaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt DashboardExecutionRole.Arn
      TaskRoleArn: !GetAtt AlphaDbApiTaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref AlphaDbApiContainerImage
          Essential: true
          Command:
            - sh
            - -c
            - |
              set -eu
              if [ -n "${KALSHI_PRIVATE_KEY_PEM:-}" ] && [ -z "${KALSHI_PRIVATE_KEY_PATH:-}" ]; then
                key_path="/tmp/alphadb-kalshi-private-key.pem"
                umask 077
                python3 - "$key_path" <<'PY'
              import os
              import pathlib
              import sys

              path = pathlib.Path(sys.argv[1])
              path.write_text(os.environ["KALSHI_PRIVATE_KEY_PEM"].replace("\\n", "\n"), encoding="utf-8")
              path.chmod(0o600)
              PY
                export KALSHI_PRIVATE_KEY_PATH="$key_path"
              fi
              exec alphadb-dashboard --host 0.0.0.0 --port "${ALPHADB_DASHBOARD_PORT:-8501}"
          PortMappings:
            - ContainerPort: !Ref AlphaDbApiPort
              Protocol: tcp
          Environment:
            - Name: ALPHADB_ENV
              Value: aws
            - Name: AWS_REGION
              Value: !Ref AwsRegionValue
            - Name: ALPHADB_AWS_REGION
              Value: !Ref AwsRegionValue
            - Name: ALPHADB_DASHBOARD_PORT
              Value: !Sub "${AlphaDbApiPort}"
            - Name: ALPHADB_RUNTIME_MODE
              Value: !Ref RuntimeMode
            - Name: ALPHADB_ENABLE_LIVE_ORDERS
              Value: "0"
            - Name: ALPHADB_HUMAN_CUTOVER_APPROVED
              Value: "0"
            - Name: ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS
              Value: "604800"
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecretArn
            - Name: ALPHADB_DASHBOARD_PIN
              ValueFrom: !Ref CockpitPinSecretArn
            - Name: ALPHADB_DASHBOARD_COOKIE_SECRET
              ValueFrom: !Ref CockpitCookieSecretArn
            - Name: KALSHI_API_KEY_ID
              ValueFrom: !Ref KalshiApiKeyIdSecretArn
            - Name: KALSHI_PRIVATE_KEY_PEM
              ValueFrom: !Ref KalshiPrivateKeyPemSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AlphaDbApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: alphadb-api

  AlphaDbApiService:
    Type: AWS::ECS::Service
    DependsOn:
      - AlphaDbApiDiscoveryService
    Properties:
      ServiceName: !Sub ${ServiceName}-alphadb-api
      Cluster: !Ref DashboardCluster
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref AlphaDbApiTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref AlphaDbApiServiceSecurityGroup
          Subnets: !Ref PrivateSubnetIds
      ServiceRegistries:
        - RegistryArn: !GetAtt AlphaDbApiDiscoveryService.Arn

  CockpitService:
    Type: AWS::ECS::Service
    DependsOn:
      - DashboardListener
      - AlphaDbApiService
    Properties:
      ServiceName: !Sub ${ServiceName}-cockpit
      Cluster: !Ref DashboardCluster
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref CockpitTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref CockpitServiceSecurityGroup
          Subnets: !Ref PrivateSubnetIds
      LoadBalancers:
        - ContainerName: cockpit
          ContainerPort: !Ref CockpitPort
          TargetGroupArn: !Ref CockpitTargetGroup

Outputs:
  ClusterName:
    Value: !Ref DashboardCluster
  CockpitServiceName:
    Value: !Ref CockpitService
  AlphaDbApiServiceName:
    Value: !Ref AlphaDbApiService
  AlphaDbApiTaskDefinitionArn:
    Value: !Ref AlphaDbApiTaskDefinition
  AlphaDbApiSecurityGroupId:
    Value: !Ref AlphaDbApiServiceSecurityGroup
  PrivateSubnetIds:
    Value: !Join [",", !Ref PrivateSubnetIds]
  LoadBalancerDnsName:
    Value: !GetAtt DashboardLoadBalancer.DNSName
  DashboardUrl:
    Value: !Sub http://${DashboardLoadBalancer.DNSName}
  ApiPrivateDnsName:
    Value: !Sub alphadb-api.${PrivateNamespaceName}
