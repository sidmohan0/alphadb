services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    command: sleep infinity
    working_dir: /workspaces/alphadb
    volumes:
      - .:/workspaces/alphadb:cached
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: alphadb
      POSTGRES_PASSWORD: alphadb
      POSTGRES_DB: alphadb
    ports:
      - "${ALPHADB_POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  dashboard:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    profiles: ["dashboard"]
    working_dir: /workspaces/alphadb
    volumes:
      - .:/workspaces/alphadb:cached
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
      ALPHADB_ENV: ${ALPHADB_ENV:-local}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      ALPHADB_AWS_REGION: ${ALPHADB_AWS_REGION:-us-east-2}
      ALPHADB_DASHBOARD_PORT: ${ALPHADB_DASHBOARD_PORT:-8501}
      ALPHADB_RUNTIME_MODE: ${ALPHADB_RUNTIME_MODE:-fixture}
      ALPHADB_ENABLE_LIVE_ORDERS: ${ALPHADB_ENABLE_LIVE_ORDERS:-0}
      ALPHADB_HUMAN_CUTOVER_APPROVED: ${ALPHADB_HUMAN_CUTOVER_APPROVED:-0}
      ALPHADB_DASHBOARD_PIN: ${ALPHADB_DASHBOARD_PIN:-}
      ALPHADB_DASHBOARD_COOKIE_SECRET: ${ALPHADB_DASHBOARD_COOKIE_SECRET:-}
      ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS: ${ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS:-604800}
    ports:
      - "${ALPHADB_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      - postgres
    command: bash -lc "python -m pip install -e '.[dashboard]' && alphadb-dashboard --host 0.0.0.0 --port 8501"

  dashboard-runtime:
    build:
      context: .
    profiles: ["dashboard-runtime"]
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
      ALPHADB_ENV: ${ALPHADB_ENV:-local}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      ALPHADB_AWS_REGION: ${ALPHADB_AWS_REGION:-us-east-2}
      ALPHADB_DASHBOARD_PORT: ${ALPHADB_DASHBOARD_PORT:-8501}
      ALPHADB_RUNTIME_MODE: ${ALPHADB_RUNTIME_MODE:-fixture}
      ALPHADB_ENABLE_LIVE_ORDERS: ${ALPHADB_ENABLE_LIVE_ORDERS:-0}
      ALPHADB_HUMAN_CUTOVER_APPROVED: ${ALPHADB_HUMAN_CUTOVER_APPROVED:-0}
      ALPHADB_DASHBOARD_PIN: ${ALPHADB_DASHBOARD_PIN:-}
      ALPHADB_DASHBOARD_COOKIE_SECRET: ${ALPHADB_DASHBOARD_COOKIE_SECRET:-}
      ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS: ${ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS:-604800}
    ports:
      - "${ALPHADB_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      - postgres

  alphadb-api:
    build:
      context: .
    profiles: ["cockpit"]
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
      ALPHADB_ENV: ${ALPHADB_ENV:-local}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      ALPHADB_AWS_REGION: ${ALPHADB_AWS_REGION:-us-east-2}
      ALPHADB_DASHBOARD_PORT: "8501"
      ALPHADB_RUNTIME_MODE: ${ALPHADB_RUNTIME_MODE:-fixture}
      ALPHADB_ENABLE_LIVE_ORDERS: ${ALPHADB_ENABLE_LIVE_ORDERS:-0}
      ALPHADB_HUMAN_CUTOVER_APPROVED: ${ALPHADB_HUMAN_CUTOVER_APPROVED:-0}
      ALPHADB_DASHBOARD_PIN: ${ALPHADB_DASHBOARD_PIN:-}
      ALPHADB_DASHBOARD_COOKIE_SECRET: ${ALPHADB_DASHBOARD_COOKIE_SECRET:-}
      ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS: ${ALPHADB_DASHBOARD_COOKIE_TTL_SECONDS:-604800}
    ports:
      - "${ALPHADB_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy

  cockpit:
    image: node:22-bookworm
    profiles: ["cockpit"]
    working_dir: /workspaces/alphadb/apps/dashboard
    volumes:
      - .:/workspaces/alphadb:cached
      - cockpit-node-modules:/workspaces/alphadb/apps/dashboard/node_modules
      - cockpit-pnpm-store:/pnpm/store
    environment:
      ALPHADB_API_BASE_URL: http://alphadb-api:8501
      NEXT_TELEMETRY_DISABLED: "1"
      PNPM_HOME: /pnpm
    ports:
      - "${ALPHADB_COCKPIT_PORT:-3000}:3000"
    depends_on:
      alphadb-api:
        condition: service_healthy
    command: >
      bash -lc
      "corepack enable
      && corepack prepare pnpm@9.15.9 --activate
      && pnpm config set store-dir /pnpm/store
      && pnpm install --frozen-lockfile
      && pnpm dev --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/alphadb/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 12

volumes:
  postgres-data:
  cockpit-node-modules:
  cockpit-pnpm-store:
