services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    command: sleep infinity
    working_dir: /workspaces/alphadb
    volumes:
      - .:/workspaces/alphadb:cached
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: alphadb
      POSTGRES_PASSWORD: alphadb
      POSTGRES_DB: alphadb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  streamlit:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    profiles: ["dashboard"]
    working_dir: /workspaces/alphadb
    volumes:
      - .:/workspaces/alphadb:cached
    environment:
      DATABASE_URL: postgresql://alphadb:alphadb@postgres:5432/alphadb
    ports:
      - "8501:8501"
    depends_on:
      - postgres
    command: bash -lc "python -m pip install -e '.[dashboard]' && streamlit hello --server.address=0.0.0.0"

volumes:
  postgres-data:
